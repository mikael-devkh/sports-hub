services:
  - type: web
    name: sports-hub-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
    healthCheckPath: /api/v1/health
